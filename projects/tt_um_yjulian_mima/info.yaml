# Tiny Tapeout project information
project:
  title: "MIMA" # Project title
  author: "Julian" # Your name
  discord: "yjulian" # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description: "A simple MIMA processor implemented in Verilog" # One line description of what your project does
  language: "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz: 0 # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1" # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module: "tt_um_yjulian_mima"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.sv"
    - "alu.sv"
    - "decoder.sv"
    - "periphery.sv"
    - "register.sv"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "DATA IN[0]"
  ui[1]: "DATA IN[1]"
  ui[2]: "DATA IN[2]"
  ui[3]: "DATA IN[3]"
  ui[4]: "DATA IN[4]"
  ui[5]: "DATA IN[5]"
  ui[6]: "DATA IN[6]"
  ui[7]: "DATA IN[7]"

  # Outputs
  uo[0]: "DATA OUT[0]"
  uo[1]: "DATA OUT[1]"
  uo[2]: "DATA OUT[2]"
  uo[3]: "DATA OUT[3]"
  uo[4]: "DATA OUT[4]"
  uo[5]: "DATA OUT[5]"
  uo[6]: "DATA OUT[6]"
  uo[7]: "DATA OUT[7]"

  # Bidirectional pins
  uio[0]: "IMM [0]"
  uio[1]: "IMM [1]"
  uio[2]: "IMM [2]"
  uio[3]: "OP [0]"
  uio[4]: "OP [1]"
  uio[5]: "OP [2]"
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
