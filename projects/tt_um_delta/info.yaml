# Tiny Tapeout project information
project:
  title:        "Delta Wing Flight Control Mixer with PWM Output"      # Project title
  author:       "Markus Jsaper Lassen"      # Your name
  discord:      "Paafugl100"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Digital flight control system for a delta wing aircraft that processes control inputs, applies stabilization logic, and generates PWM signals for elevon and rudder actuators using a time-multiplexed output interface."      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     50000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_delta"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "Data input bit 0 (LSB)"
  ui[1]: "Data input bit 1"
  ui[2]: "Data input bit 2"
  ui[3]: "Data input bit 3"
  ui[4]: "Data input bit 4"
  ui[5]: "Data input bit 5"
  ui[6]: "Data input bit 6"
  ui[7]: "Data input bit 7 (MSB)"

  # Outputs
  uo[0]: "PWM data bit 0"
  uo[1]: "PWM data bit 1"
  uo[2]: "PWM data bit 2"
  uo[3]: "PWM data bit 3"
  uo[4]: "PWM data bit 4"
  uo[5]: "Channel tag bit 0"
  uo[6]: "Channel tag bit 1"
  uo[7]: "Channel tag bit 2"

  # Bidirectional pins
  uio[0]: "Unused"
  uio[1]: "Unused"
  uio[2]: "Unused"
  uio[3]: "Unused"
  uio[4]: "Unused"
  uio[5]: "Unused"
  uio[6]: "Unused"
  uio[7]: "Unused"

# Do not change!
yaml_version: 6
